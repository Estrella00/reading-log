<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閱讀紀錄</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c5c3c">
<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="閱讀紀錄">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #f2ece1;
    --surface:       #fdfaf4;
    --surface2:      #f7f1e6;
    --primary:       #7c5c3c;
    --primary-dark:  #5c3e28;
    --primary-light: #ede3d8;
    --text:          #2c1f14;
    --text-2:        #7a6656;
    --text-3:        #b5a492;
    --border:        #ddd0bc;
    --gold:          #c9922a;
    --gold-light:    #f5e8cc;
    --reading:       #4a7a6a;
    --reading-light: #d8ede7;
    --success:       #5a7a5a;
    --success-light: #e8efe8;
    --danger:        #9b5454;
    --danger-light:  #f5eded;
    --radius:        6px;
    --shadow:        0 1px 4px rgba(60,35,10,0.08);
    --shadow-md:     0 4px 14px rgba(60,35,10,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(255,240,210,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(200,170,130,0.15) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── Header ──────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-title { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; line-height: 1.2; }
  .header-sub   { font-size: 13px; color: var(--text-3); letter-spacing: 0.08em; margin-top: 1px; font-weight: 400; }
  .btn-add {
    background: var(--primary); color: #fdfaf4; border: none;
    padding: 8px 16px; border-radius: var(--radius);
    font-family: inherit; font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer; display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover  { background: var(--primary-dark); }
  .btn-add:active { transform: scale(0.97); }

  /* ── Container ───────────────────────────────────── */
  .container { max-width: 760px; margin: 0 auto; padding: 20px 20px 80px; }

  /* ── Toolbar ─────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat {
    text-align: center; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 16px; box-shadow: var(--shadow); min-width: 64px;
  }
  .stat-num   { font-size: 24px; font-weight: 700; line-height: 1.1; }
  .stat-label { font-size: 13px; color: var(--text-3); letter-spacing: 0.05em; margin-top: 2px; }
  .stat-want     .stat-num { color: var(--primary); }
  .stat-reading  .stat-num { color: var(--reading); }
  .stat-finished .stat-num { color: var(--gold); }

  .io-btns { display: flex; gap: 6px; }
  .btn-io {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
    font-family: inherit; font-size: 14px; padding: 6px 12px; border-radius: var(--radius);
    cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-io:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  #importInput { display: none; }

  /* ── Tabs ────────────────────────────────────────── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab {
    padding: 10px 18px; border: none; background: transparent;
    font-family: inherit; font-size: 15px; font-weight: 500; color: var(--text-3);
    cursor: pointer; letter-spacing: 0.04em;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    white-space: nowrap; transition: color 0.2s, border-color 0.2s;
  }
  .tab.active-want     { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
  .tab.active-reading  { color: var(--reading); border-bottom-color: var(--reading); font-weight: 700; }
  .tab.active-finished { color: var(--gold);    border-bottom-color: var(--gold);    font-weight: 700; }
  .tab.active-cal      { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

  /* ── Tab Panel ───────────────────────────────────── */
  .tab-panel {
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius); padding: 18px;
    box-shadow: var(--shadow); min-height: 200px;
  }

  /* ── Search ──────────────────────────────────────── */
  .search-bar { margin-bottom: 16px; }
  .search-bar input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 9px 12px;
    font-family: inherit; font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,92,60,0.1); }
  .search-bar input::placeholder { color: var(--text-3); }

  /* ── Book Card ───────────────────────────────────── */
  .book-card {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px; margin-bottom: 10px; background: var(--surface2);
    border: 1px solid var(--border); border-left: 3px solid var(--primary-light);
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: box-shadow 0.2s, border-left-color 0.2s;
  }
  .book-card:hover { box-shadow: var(--shadow-md); border-left-color: var(--primary); }
  .book-card.reading-card  { border-left-color: var(--reading-light); }
  .book-card.reading-card:hover  { border-left-color: var(--reading); }
  .book-card.finished-card { border-left-color: var(--gold-light); }
  .book-card.finished-card:hover { border-left-color: var(--gold); }
  .book-card:last-child { margin-bottom: 0; }

  .book-info { flex: 1; min-width: 0; }
  .book-title {
    font-size: 17px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);
  }
  .book-author { font-size: 14px; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.04em; }
  .book-meta {
    font-size: 13px; color: var(--text-3);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; letter-spacing: 0.03em;
  }
  .book-notes {
    font-size: 14px; color: var(--text-2); margin-top: 7px; line-height: 1.6; font-style: italic;
    display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
  }
  .status-badge {
    display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px;
    font-weight: 500; letter-spacing: 0.04em;
  }
  .badge-reading  { background: var(--reading-light); color: var(--reading); }
  .badge-finished { background: var(--gold-light);    color: var(--gold);    }

  .stars-display { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
  .stars-display .empty-star { color: var(--border); }

  .book-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .btn-sm {
    padding: 4px 10px; border-radius: var(--radius); font-family: inherit;
    font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s; white-space: nowrap;
  }
  .btn-start   { background: var(--reading);  color: #fff;    border-color: var(--reading); }
  .btn-start:hover   { background: #3a6a5a; }
  .btn-finish  { background: var(--success);  color: #fff;    border-color: var(--success); }
  .btn-finish:hover  { background: #4a6a4a; }
  .btn-view    { background: var(--primary);  color: #fdfaf4; border-color: var(--primary); }
  .btn-view:hover    { background: var(--primary-dark); }
  .btn-edit    { background: transparent; color: var(--text-2); border-color: var(--border); }
  .btn-edit:hover    { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
  .btn-delete  { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-delete:hover  { background: var(--danger-light); }

  /* ── Empty State ─────────────────────────────────── */
  .empty { text-align: center; padding: 48px 16px; color: var(--text-3); }
  .empty-icon  { font-size: 46px; margin-bottom: 12px; opacity: 0.7; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; letter-spacing: 0.04em; }
  .empty-desc  { font-size: 14px; letter-spacing: 0.04em; }

  /* ══════════════════════════════════════════════════
     Calendar
  ══════════════════════════════════════════════════ */
  .cal-nav-row {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
  }
  .cal-nav {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    width: 34px; height: 34px; font-size: 20px; color: var(--text-2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s; flex-shrink: 0;
  }
  .cal-nav:hover { background: var(--primary-light); color: var(--primary); }
  .cal-month-info { text-align: center; }
  .cal-month-title {
    font-size: 19px; font-weight: 700; color: var(--primary); letter-spacing: 0.06em; cursor: pointer;
  }
  .cal-month-title:hover { text-decoration: underline; text-underline-offset: 3px; }
  .cal-month-count { font-size: 13px; color: var(--text-3); letter-spacing: 0.06em; margin-top: 2px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 20px; }
  .cal-weekday {
    text-align: center; font-size: 13px; color: var(--text-3); letter-spacing: 0.08em; padding: 4px 0 10px;
  }
  .cal-weekday:first-child { color: #b07a7a; }
  .cal-weekday:last-child  { color: #7a90b0; }

  .cal-day {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 6px 2px 5px; border-radius: var(--radius); height: 72px;
    overflow: hidden; cursor: default; transition: background 0.15s; position: relative;
  }
  .cal-day.other-month { opacity: 0.25; }
  .cal-day.has-book { cursor: pointer; background: var(--surface2); border: 1px solid var(--border); }
  .cal-day.has-book:hover { background: var(--primary-light); border-color: #c9a882; }
  .cal-day.today .cal-day-num {
    background: var(--primary-light); color: var(--primary); font-weight: 700;
    border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  }
  .cal-day.selected { background: var(--primary) !important; border-color: var(--primary) !important; }
  .cal-day.selected .cal-day-num,
  .cal-day.selected .cal-day-num span { color: #fdfaf4 !important; background: rgba(255,255,255,0.2) !important; }
  .cal-day.selected .cal-dot          { background: rgba(255,255,255,0.7) !important; }
  .cal-day.selected .cal-book-preview { color: rgba(255,255,255,0.85) !important; }

  .cal-day-num {
    font-size: 15px; line-height: 1; color: var(--text);
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  }
  .cal-day:nth-child(7n+1) .cal-day-num { color: #a05050; }
  .cal-day:nth-child(7n)   .cal-day-num { color: #5070a0; }

  .cal-dots { display: flex; gap: 3px; justify-content: center; margin-top: 4px; flex-wrap: nowrap; overflow: hidden; max-width: 100%; }
  .cal-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
  .cal-dot-more { font-size: 11px; color: var(--primary); font-weight: 700; line-height: 5px; }
  .cal-book-preview {
    font-size: 11px; color: var(--text-3); text-align: center; margin-top: 3px;
    width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    padding: 0 3px; line-height: 1.3;
  }

  .cal-section-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    font-size: 14px; color: var(--text-3); letter-spacing: 0.08em;
  }
  .cal-section-header::before, .cal-section-header::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .cal-book-row {
    display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; margin-bottom: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--primary-light); border-radius: 0 var(--radius) var(--radius) 0;
    transition: border-left-color 0.15s, box-shadow 0.15s;
  }
  .cal-book-row:last-child { margin-bottom: 0; }
  .cal-book-row.highlighted { border-left-color: var(--primary); box-shadow: var(--shadow-md); background: var(--primary-light); }
  .cal-book-date  { font-size: 13px; color: var(--text-3); letter-spacing: 0.04em; white-space: nowrap; padding-top: 2px; min-width: 48px; }
  .cal-book-body  { flex: 1; min-width: 0; }
  .cal-book-title  { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 0.03em; }
  .cal-book-author { font-size: 13px; color: var(--text-2); margin-top: 1px; }
  .cal-book-notes  {
    font-size: 13px; color: var(--text-2); margin-top: 5px; font-style: italic; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cal-no-books { text-align: center; padding: 32px 16px; color: var(--text-3); font-size: 15px; letter-spacing: 0.04em; }

  /* ── Modal ───────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44,24,10,0.45); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  @media (min-width: 520px) { .modal-overlay { align-items: center; } }
  .modal {
    background: var(--surface); border-radius: 10px 10px 0 0; padding: 26px 24px;
    width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.3s ease;
    box-shadow: 0 -4px 30px rgba(60,35,10,0.12);
  }
  @media (min-width: 520px) {
    .modal { border-radius: 10px; transform: translateY(12px); box-shadow: var(--shadow-md); }
    .modal-overlay.open .modal { transform: translateY(0); }
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 19px; font-weight: 700; letter-spacing: 0.04em; color: var(--primary); }
  .btn-close {
    background: var(--bg); border: 1px solid var(--border); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; color: var(--text-2); flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-close:hover { background: var(--border); }

  /* ── Status Picker ───────────────────────────────── */
  .status-picker { display: flex; gap: 6px; }
  .status-btn {
    flex: 1; padding: 9px 4px; border-radius: var(--radius);
    font-family: inherit; font-size: 15px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: var(--bg);
    color: var(--text-2); transition: all 0.15s; text-align: center; letter-spacing: 0.04em;
  }
  .status-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .status-btn.active[data-s="want"]     { background: var(--primary); border-color: var(--primary);    color: #fdfaf4; }
  .status-btn.active[data-s="reading"]  { background: var(--reading); border-color: var(--reading);    color: #fdfaf4; }
  .status-btn.active[data-s="finished"] { background: var(--gold);    border-color: var(--gold);       color: #fdfaf4; }

  /* ── Form ────────────────────────────────────────── */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; color: var(--text-2); margin-bottom: 6px; }
  .label-opt { color: var(--text-3); font-weight: 400; }
  .required   { color: var(--danger); }
  input[type=text], input[type=date], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); font-family: inherit; font-size: 16px; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type=text]:focus, input[type=date]:focus, textarea:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,92,60,0.1); background: var(--surface);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.65; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 4px; display: none; letter-spacing: 0.04em; }

  /* ── Star Rating ─────────────────────────────────── */
  .stars-input { display: flex; gap: 4px; }
  .star-btn {
    font-size: 28px; cursor: pointer; color: var(--border); background: none; border: none;
    padding: 0 2px; line-height: 1; transition: color 0.12s, transform 0.1s;
  }
  .star-btn:hover  { transform: scale(1.15); }
  .star-btn.filled { color: var(--gold); }

  /* ── Form Actions ────────────────────────────────── */
  .form-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  }
  .btn-lg {
    padding: 9px 20px; border-radius: var(--radius); font-family: inherit;
    font-size: 16px; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
  }
  .btn-lg:active  { transform: scale(0.97); }
  .btn-cancel     { background: var(--bg);      color: var(--text-2); border-color: var(--border); }
  .btn-cancel:hover { background: var(--border); }
  .btn-confirm    { background: var(--primary);  color: #fdfaf4; border-color: var(--primary); }
  .btn-confirm:hover { background: var(--primary-dark); }
  .btn-done       { background: var(--success);  color: #fff; border-color: var(--success); }
  .btn-done:hover { background: #4a6a4a; }

  /* ── View book info box ──────────────────────────── */
  .view-book-info {
    background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--primary);
    border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 14px; margin-bottom: 18px;
  }
  .view-book-title  { font-size: 17px; font-weight: 700; color: var(--text); }
  .view-book-author { font-size: 14px; color: var(--text-2); margin-top: 2px; }

  /* ── Toast ───────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: #fdfaf4; padding: 10px 20px; border-radius: 20px;
    font-size: 15px; letter-spacing: 0.04em; z-index: 999;
    opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Divider ─────────────────────────────────────── */
  .form-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0 16px; font-size: 13px; color: var(--text-3); letter-spacing: 0.06em;
  }
  .form-divider::before, .form-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div>
      <div class="header-title">閱讀紀錄</div>
      <div class="header-sub">記錄每一本讀過的好書</div>
    </div>
    <button class="btn-add" onclick="openAddModal()">＋ 新增書籍</button>
  </div>
</header>

<div class="container">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="stats">
      <div class="stat stat-want">
        <div class="stat-num" id="statWant">0</div>
        <div class="stat-label">想讀</div>
      </div>
      <div class="stat stat-reading">
        <div class="stat-num" id="statReading">0</div>
        <div class="stat-label">正在讀</div>
      </div>
      <div class="stat stat-finished">
        <div class="stat-num" id="statFinished">0</div>
        <div class="stat-label">已讀完</div>
      </div>
    </div>
    <div class="io-btns">
      <button class="btn-io" onclick="exportData()">↑ 匯出備份</button>
      <button class="btn-io" onclick="document.getElementById('importInput').click()">↓ 匯入備份</button>
      <input type="file" id="importInput" accept=".json" onchange="importData(event)">
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active-want" id="tabWant"     onclick="switchTab('want')">想讀的書 <span id="wantBadge"></span></button>
    <button class="tab"             id="tabReading"  onclick="switchTab('reading')">正在讀 <span id="readingBadge"></span></button>
    <button class="tab"             id="tabFinished" onclick="switchTab('finished')">已讀完 <span id="finishedBadge"></span></button>
    <button class="tab"             id="tabCal"      onclick="switchTab('cal')">月曆</button>
  </div>

  <!-- Panel -->
  <div class="tab-panel">
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchInput" placeholder="搜尋書名或作者…" oninput="renderLists()">
    </div>
    <div id="wantList"></div>
    <div id="readingList"   style="display:none;"></div>
    <div id="finishedList"  style="display:none;"></div>
    <div id="calendarPanel" style="display:none;"></div>
  </div>

</div>

<!-- ── Toast ──────────────────────────────────────── -->
<div class="toast" id="toast"></div>


<!-- ══ Modal: 新增 / 編輯書籍 ════════════════════════ -->
<div class="modal-overlay" id="addOverlay" onclick="onOverlayClick(event,'addOverlay')">
  <div class="modal">

      <div class="modal-title" id="addModalTitle">新增書籍</div>

    <!-- 書名、作者 -->

    <div class="form-group">

    <!-- 狀態選擇 -->

    <!-- 開始日期（正在讀 + 已讀完） -->

      <div class="form-group">

          <button class="star-btn" data-v="2" onclick="setAddRating(2)">★</button>
          <button class="star-btn" data-v="3" onclick="setAddRating(3)">★</button>
          <button class="star-btn" data-v="4" onclick="setAddRating(4)">★</button>
          <button class="star-btn" data-v="5" onclick="setAddRating(5)">★</button>
        </div>

    <div class="form-actions">
      <button class="btn-lg btn-cancel"  onclick="closeModal('addOverlay')">取消</button>
      <button class="btn-lg btn-confirm" id="addSubmitBtn" onclick="submitAdd()">新增</button>
    </div>
  </div>
</div>


<!-- ══ Modal: 標記讀完（從正在讀移至已讀完） ════════ -->
<div class="modal-overlay" id="finishOverlay" onclick="onOverlayClick(event,'finishOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">標記為已讀完</div>
      <button class="btn-close" onclick="closeModal('finishOverlay')">✕</button>
    </div>
    <input type="hidden" id="finishId">
    <input type="hidden" id="finishSrcList">
    <div class="view-book-info" id="finishBookInfo"></div>
    <div class="form-group">
      <label>讀完日期</label>
      <input type="date" id="finishDate">
    </div>
    <div class="form-group">
      <label>評分 <span class="label-opt">（選填）</span></label>
      <div class="stars-input" id="finishStars">
        <button class="star-btn" data-v="1" onclick="setRating('finish',1)">★</button>
        <button class="star-btn" data-v="2" onclick="setRating('finish',2)">★</button>
        <button class="star-btn" data-v="3" onclick="setRating('finish',3)">★</button>
        <button class="star-btn" data-v="4" onclick="setRating('finish',4)">★</button>
        <button class="star-btn" data-v="5" onclick="setRating('finish',5)">★</button>
      </div>
    </div>
    <div class="form-group">
      <label>心得筆記 <span class="label-opt">（選填）</span></label>
      <textarea id="finishNotes" placeholder="寫下這本書帶給你的感受…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-lg btn-cancel" onclick="closeModal('finishOverlay')">取消</button>
      <button class="btn-lg btn-done"   onclick="submitFinish()">確認完成</button>

  </div>
</div>


<!-- ══ Modal: 查看 / 編輯已讀完 ═════════════════════ -->
<div class="modal-overlay" id="viewOverlay" onclick="onOverlayClick(event,'viewOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">讀書紀錄</div>
      <button class="btn-close" onclick="closeModal('viewOverlay')">✕</button>
    </div>
    <input type="hidden" id="viewId">
    <div class="view-book-info" id="viewBookInfo"></div>
    <div class="form-group">
      <label>開始閱讀日期 <span class="label-opt">（選填）</span></label>
      <input type="date" id="viewStartDate">
    </div>
    <div class="form-group">
      <label>讀完日期</label>
      <input type="date" id="viewDate">
    </div>
    <div class="form-group">
      <label>評分</label>
      <div class="stars-input" id="viewStars">
        <button class="star-btn" data-v="1" onclick="setRating('view',1)">★</button>
        <button class="star-btn" data-v="2" onclick="setRating('view',2)">★</button>
        <button class="star-btn" data-v="3" onclick="setRating('view',3)">★</button>
        <button class="star-btn" data-v="4" onclick="setRating('view',4)">★</button>
        <button class="star-btn" data-v="5" onclick="setRating('view',5)">★</button>
      </div>
    </div>
    <div class="form-group">
      <label>心得筆記</label>
      <textarea id="viewNotes" placeholder="寫下這本書帶給你的感受…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-lg btn-cancel"  onclick="closeModal('viewOverlay')">關閉</button>
      <button class="btn-lg btn-confirm" onclick="submitUpdate()">儲存</button>
    </div>
  </div>
</div>


<script>
// ── State ─────────────────────────────────────────────
let data    = { wantToRead: [], reading: [], finished: [] };
let curTab  = 'want';
let ratings = { finish: 0, view: 0 };

// Add modal state
let addStatus  = 'want';
let addRating  = 0;
let editingId  = null;
let editingSrc = null; // 'want' | 'reading' | 'finished'

// Calendar state
let calYear    = new Date().getFullYear();
let calMonth   = new Date().getMonth();
let calSelDate = null;

// ── Persistence ───────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem('readingLog_v1');
    if (s) data = JSON.parse(s);
  } catch(e) {}
  if (!Array.isArray(data.wantToRead)) data.wantToRead = [];
  if (!Array.isArray(data.reading))    data.reading    = [];
  if (!Array.isArray(data.finished))   data.finished   = [];
}
function save() { localStorage.setItem('readingLog_v1', JSON.stringify(data)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

// ── Export / Import ───────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `閱讀紀錄備份_${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('已匯出備份檔案');
}
function importData(e) {
  const file = e.target.files[0]; e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp.wantToRead) || !Array.isArray(imp.finished)) throw new Error();
      if (!Array.isArray(imp.reading)) imp.reading = [];
      if (!confirm(`匯入後將覆蓋現有資料：\n・想讀 ${imp.wantToRead.length} 本\n・正在讀 ${imp.reading.length} 本\n・已讀 ${imp.finished.length} 本\n\n確定繼續？`)) return;
      data = imp;
      save(); renderAll(); toast('匯入成功');
    } catch(err) { alert('匯入失敗，請確認選取的是正確的備份檔案。'); }
  };
  reader.readAsText(file);
}

// ── Tab ───────────────────────────────────────────────
function switchTab(tab) {
  curTab = tab;
  const tabs = { want: 'active-want', reading: 'active-reading', finished: 'active-finished', cal: 'active-cal' };
  ['tabWant','tabReading','tabFinished','tabCal'].forEach(id => {
    document.getElementById(id).className = 'tab';
  });
  const activeMap = { want: 'tabWant', reading: 'tabReading', finished: 'tabFinished', cal: 'tabCal' };
  document.getElementById(activeMap[tab]).className = `tab ${tabs[tab]}`;

  document.getElementById('wantList').style.display       = tab === 'want'     ? '' : 'none';
  document.getElementById('readingList').style.display    = tab === 'reading'  ? '' : 'none';
  document.getElementById('finishedList').style.display   = tab === 'finished' ? '' : 'none';
  document.getElementById('calendarPanel').style.display  = tab === 'cal'      ? '' : 'none';
  document.getElementById('searchBar').style.display      = tab === 'cal'      ? 'none' : '';

  if (tab !== 'cal') document.getElementById('searchInput').value = '';
  renderAll();
}

// ── Render All ────────────────────────────────────────
function renderAll() {
  updateStats();
  renderLists();
  if (curTab === 'cal') renderCalendar();
}

// ── Render Lists ──────────────────────────────────────
function sq() { return document.getElementById('searchInput').value.trim().toLowerCase(); }

function renderLists() {
  updateStats();
  const q = sq();
  const filter = list => q ? list.filter(b => b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q)) : list;

  // ── Want ──
  const want = filter(data.wantToRead);
  document.getElementById('wantList').innerHTML = want.length === 0
    ? emptyState(q ? '找不到符合的書籍' : '書單是空的', q ? '試試其他關鍵字' : '點擊右上角「新增書籍」開始建立書單')
    : want.map(b => `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title" title="${x(b.title)}">${x(b.title)}</div>
          ${b.author ? `<div class="book-author">${x(b.author)}</div>` : ''}
          <div class="book-meta">加入於 ${fmtDate(b.addedDate)}</div>
        </div>
        <div class="book-actions">
          <button class="btn-sm btn-start"  onclick="openFinishModal('${b.id}','want','reading')">開始讀</button>
          <button class="btn-sm btn-finish" onclick="openFinishModal('${b.id}','want','finished')">讀完了</button>
          <button class="btn-sm btn-edit"   onclick="openEditModal('${b.id}','want')">編輯</button>
          <button class="btn-sm btn-delete" onclick="deleteBook('${b.id}','want')">刪除</button>
        </div>
      </div>`).join('');

  // ── Reading ──
  const reading = filter(data.reading);
  document.getElementById('readingList').innerHTML = reading.length === 0
    ? emptyState(q ? '找不到符合的書籍' : '目前沒有正在讀的書', q ? '試試其他關鍵字' : '新增書籍時選擇「正在讀」即可加入')
    : reading.map(b => `
      <div class="book-card reading-card">
        <div class="book-info">
          <div class="book-title" title="${x(b.title)}">${x(b.title)}</div>
          ${b.author ? `<div class="book-author">${x(b.author)}</div>` : ''}
          <div class="book-meta">
            <span class="status-badge badge-reading">正在讀</span>
            ${b.startDate ? `<span>開始於 ${fmtDate(b.startDate)}</span>` : ''}
          </div>
        </div>
        <div class="book-actions">
          <button class="btn-sm btn-finish" onclick="openFinishModal('${b.id}','reading','finished')">讀完了</button>
          <button class="btn-sm btn-edit"   onclick="openEditModal('${b.id}','reading')">編輯</button>
          <button class="btn-sm btn-delete" onclick="deleteBook('${b.id}','reading')">刪除</button>
        </div>
      </div>`).join('');

  // ── Finished ──
  const finished = filter(data.finished);
  document.getElementById('finishedList').innerHTML = finished.length === 0
    ? emptyState(q ? '找不到符合的書籍' : '還沒有讀完的書', q ? '試試其他關鍵字' : '從書單點「讀完了」即可移到這裡')
    : finished.map(b => {
        const stars = b.rating
          ? '★'.repeat(b.rating) + '<span class="empty-star">' + '★'.repeat(5 - b.rating) + '</span>'
          : '';
        return `
        <div class="book-card finished-card">
          <div class="book-info">
            <div class="book-title" title="${x(b.title)}">${x(b.title)}</div>
            ${b.author ? `<div class="book-author">${x(b.author)}</div>` : ''}
            <div class="book-meta">
              ${b.startDate    ? `<span>開始 ${fmtDate(b.startDate)}</span>` : ''}
              ${b.finishedDate ? `<span>讀完 ${fmtDate(b.finishedDate)}</span>` : ''}
              ${stars ? `<span class="stars-display">${stars}</span>` : ''}
            </div>
            ${b.notes ? `<div class="book-notes">${x(b.notes)}</div>` : ''}
          </div>
          <div class="book-actions">
            <button class="btn-sm btn-view"   onclick="openViewModal('${b.id}')">查看編輯</button>
            <button class="btn-sm btn-delete" onclick="deleteBook('${b.id}','finished')">刪除</button>
          </div>
        </div>`;
      }).join('');
}

function updateStats() {
  document.getElementById('statWant').textContent     = data.wantToRead.length;
  document.getElementById('statReading').textContent  = data.reading.length;
  document.getElementById('statFinished').textContent = data.finished.length;
  document.getElementById('wantBadge').textContent     = data.wantToRead.length ? `(${data.wantToRead.length})` : '';
  document.getElementById('readingBadge').textContent  = data.reading.length    ? `(${data.reading.length})`    : '';
  document.getElementById('finishedBadge').textContent = data.finished.length   ? `(${data.finished.length})`   : '';
}

function emptyState(title, desc) {
  return `<div class="empty"><div class="empty-icon">◎</div>
    <div class="empty-title">${title}</div><div class="empty-desc">${desc}</div></div>`;
}

// ── Add / Edit Modal ──────────────────────────────────
function openAddModal() {
  editingId = null; editingSrc = null;
  document.getElementById('addModalTitle').textContent = '新增書籍';
  document.getElementById('addSubmitBtn').textContent  = '新增';
  document.getElementById('addTitle').value  = '';
  document.getElementById('addAuthor').value = '';
  document.getElementById('addStartDate').value  = today();
  document.getElementById('addFinishDate').value = today();
  document.getElementById('addNotes').value = '';
  addRating = 0; renderAddStars(0);
  setAddStatus('want');
  openModal('addOverlay');
  setTimeout(() => document.getElementById('addTitle').focus(), 280);
}

function openEditModal(id, src) {
  const list = src === 'want' ? data.wantToRead : data.reading;
  const book = list.find(b => b.id === id);
  if (!book) return;

  editingId = id; editingSrc = src;
  document.getElementById('addModalTitle').textContent = '編輯書籍';
  document.getElementById('addSubmitBtn').textContent  = '儲存';
  document.getElementById('addTitle').value  = book.title;
  document.getElementById('addAuthor').value = book.author || '';
  addRating = 0; renderAddStars(0);
  // 先顯示對應欄位，再填值，避免 hidden 元素 value 無法渲染的問題
  setAddStatus(src);
  document.getElementById('addStartDate').value  = book.startDate  || '';
  document.getElementById('addFinishDate').value = today();
  document.getElementById('addNotes').value = '';
  openModal('addOverlay');
  setTimeout(() => document.getElementById('addTitle').focus(), 280);
}

function setAddStatus(s) {
  addStatus = s;
  document.querySelectorAll('.status-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.s === s);
  });
  document.getElementById('grpStartDate').style.display = (s === 'reading' || s === 'finished') ? '' : 'none';
  document.getElementById('grpFinished').style.display  = s === 'finished' ? '' : 'none';
}

function setAddRating(val) {
  addRating = val;
  renderAddStars(val);
}

function renderAddStars(val) {
  document.getElementById('addStars').querySelectorAll('.star-btn').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.v) <= val);
  });
}

function submitAdd() {
  const title  = document.getElementById('addTitle').value.trim();
  const author = document.getElementById('addAuthor').value.trim();
  if (!title) { document.getElementById('addTitleErr').style.display = 'block'; document.getElementById('addTitle').focus(); return; }

  // Build book object
  const base = editingId
    ? { ...(editingSrc === 'want' ? data.wantToRead : data.reading).find(b => b.id === editingId) }
    : { id: uid(), addedDate: today() };

  base.title  = title;
  base.author = author;

  if (addStatus === 'reading' || addStatus === 'finished') {
    base.startDate = document.getElementById('addStartDate').value || null;
  } else {
    delete base.startDate;
  }

  if (addStatus === 'finished') {
    base.finishedDate = document.getElementById('addFinishDate').value || null;
    base.rating       = addRating;
    base.notes        = document.getElementById('addNotes').value.trim();
  } else {
    delete base.finishedDate;
    delete base.rating;
    delete base.notes;
  }

  // Remove from original list if editing
  if (editingId && editingSrc) {
    data[editingSrc === 'want' ? 'wantToRead' : editingSrc] =
      data[editingSrc === 'want' ? 'wantToRead' : editingSrc].filter(b => b.id !== editingId);
  }

  // Add to target list
  const targetList = addStatus === 'want' ? 'wantToRead' : addStatus;
  data[targetList].unshift(base);

  save(); renderAll(); closeModal('addOverlay');

  const tabMap = { want: 'want', reading: 'reading', finished: 'finished' };
  if (curTab !== tabMap[addStatus]) switchTab(tabMap[addStatus]);

  toast(editingId ? `《${title}》已更新` : `《${title}》已加入`);
  editingId = null; editingSrc = null;
}

// ── Finish Modal (want→finished, want→reading, reading→finished) ──
function openFinishModal(id, srcList, targetStatus) {
  const list = srcList === 'want' ? data.wantToRead : data.reading;
  const book = list.find(b => b.id === id);
  if (!book) return;

  document.getElementById('finishId').value    = id;
  document.getElementById('finishSrcList').value = srcList;

  document.getElementById('finishBookInfo').innerHTML =
    `<div class="view-book-title">${x(book.title)}</div>` +
    (book.author ? `<div class="view-book-author">${x(book.author)}</div>` : '');

  if (targetStatus === 'reading') {
    // Just ask for start date — reuse the same modal with minimal fields
    document.querySelector('#finishOverlay .modal-title').textContent = '開始閱讀';
    document.querySelector('#finishOverlay .btn-done').textContent    = '確認開始';
    document.getElementById('finishDate').parentElement.querySelector('label').textContent = '開始閱讀日期';
    document.getElementById('finishStars').closest('.form-group').style.display    = 'none';
    document.getElementById('finishNotes').closest('.form-group').style.display    = 'none';
    document.getElementById('finishDate').value = today();
    document.getElementById('finishSrcList').value = srcList + '→reading';
  } else {
    document.querySelector('#finishOverlay .modal-title').textContent = '標記為已讀完';
    document.querySelector('#finishOverlay .btn-done').textContent    = '確認完成';
    document.getElementById('finishDate').parentElement.querySelector('label').textContent = '讀完日期';
    document.getElementById('finishStars').closest('.form-group').style.display    = '';
    document.getElementById('finishNotes').closest('.form-group').style.display    = '';
    ratings.finish = 0;
    renderStars('finish', 0);
    document.getElementById('finishDate').value  = today();
    document.getElementById('finishNotes').value = '';
  }

  openModal('finishOverlay');
}

function submitFinish() {
  const id      = document.getElementById('finishId').value;
  const srcInfo = document.getElementById('finishSrcList').value;
  const toReading = srcInfo.endsWith('→reading');
  const srcList   = toReading ? srcInfo.replace('→reading','') : srcInfo;

  const list = srcList === 'want' ? data.wantToRead : data.reading;
  const book = list.find(b => b.id === id);
  if (!book) return;

  // Remove from source
  if (srcList === 'want') data.wantToRead = data.wantToRead.filter(b => b.id !== id);
  else                    data.reading    = data.reading.filter(b => b.id !== id);

  if (toReading) {
    data.reading.unshift({ ...book, startDate: document.getElementById('finishDate').value });
    save(); renderAll(); closeModal('finishOverlay');
    switchTab('reading');
    toast(`《${book.title}》開始閱讀`);
  } else {
    data.finished.unshift({
      ...book,
      finishedDate: document.getElementById('finishDate').value,
      rating:       ratings.finish,
      notes:        document.getElementById('finishNotes').value.trim()
    });
    save(); renderAll(); closeModal('finishOverlay');
    switchTab('finished');
    toast(`《${book.title}》已讀完`);
  }
}

// ── Delete ────────────────────────────────────────────
function deleteBook(id, list) {
  if (!confirm('確定要刪除這本書嗎？')) return;
  const key = list === 'want' ? 'wantToRead' : list;
  data[key] = data[key].filter(b => b.id !== id);
  save(); renderAll();
}

// ── View / Edit Finished ──────────────────────────────
function openViewModal(id) {
  const b = data.finished.find(b => b.id === id);
  if (!b) return;
  ratings.view = b.rating || 0;
  document.getElementById('viewId').value = id;
  document.getElementById('viewBookInfo').innerHTML =
    `<div class="view-book-title">${x(b.title)}</div>` +
    (b.author ? `<div class="view-book-author">${x(b.author)}</div>` : '');
  document.getElementById('viewStartDate').value = b.startDate    || '';
  document.getElementById('viewDate').value      = b.finishedDate || '';
  document.getElementById('viewNotes').value     = b.notes || '';
  renderStars('view', ratings.view);
  openModal('viewOverlay');
}

function submitUpdate() {
  const id  = document.getElementById('viewId').value;
  const idx = data.finished.findIndex(b => b.id === id);
  if (idx === -1) return;
  data.finished[idx] = {
    ...data.finished[idx],
    startDate:    document.getElementById('viewStartDate').value || null,
    finishedDate: document.getElementById('viewDate').value      || null,
    rating:       ratings.view,
    notes:        document.getElementById('viewNotes').value.trim()
  };
  save(); renderAll(); closeModal('viewOverlay'); toast('紀錄已儲存');
}

// ── Rating ────────────────────────────────────────────
function setRating(mode, val) { ratings[mode] = val; renderStars(mode, val); }
function renderStars(mode, val) {
  const id = mode === 'finish' ? 'finishStars' : 'viewStars';
  document.getElementById(id).querySelectorAll('.star-btn').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.v) <= val);
  });
}

// ── Calendar ──────────────────────────────────────────
const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const WEEKDAYS    = ['日','一','二','三','四','五','六'];

function renderCalendar() {
  const byDate = {};
  data.finished.forEach(b => {
    if (b.finishedDate) (byDate[b.finishedDate] = byDate[b.finishedDate] || []).push(b);
  });

  const pad      = n => String(n).padStart(2, '0');
  const monthKey = `${calYear}-${pad(calMonth + 1)}`;
  const todayStr = today();

  const firstWeekday = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth  = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev   = new Date(calYear, calMonth, 0).getDate();

  const monthBooks = data.finished
    .filter(b => b.finishedDate && b.finishedDate.startsWith(monthKey))
    .sort((a, b) => a.finishedDate.localeCompare(b.finishedDate));

  let html = '';

  html += `<div class="cal-nav-row">
    <button class="cal-nav" onclick="calMove(-1)">‹</button>
    <div class="cal-month-info">
      <div class="cal-month-title" onclick="calGoToday()" title="回到本月">${calYear} 年 ${MONTH_NAMES[calMonth]}</div>
      <div class="cal-month-count">${monthBooks.length ? `本月讀了 ${monthBooks.length} 本` : '本月尚無讀書紀錄'}</div>
    </div>
    <button class="cal-nav" onclick="calMove(1)">›</button>
  </div>`;

  html += '<div class="cal-grid">';
  WEEKDAYS.forEach(d => { html += `<div class="cal-weekday">${d}</div>`; });

  for (let i = 0; i < firstWeekday; i++) {
    const d = daysInPrev - firstWeekday + 1 + i;
    html += `<div class="cal-day other-month"><span class="cal-day-num">${d}</span></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${pad(calMonth + 1)}-${pad(d)}`;
    const books   = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    const isSel   = dateStr === calSelDate;

    let cls = 'cal-day';
    if (books.length) cls += ' has-book';
    if (isToday)      cls += ' today';
    if (isSel)        cls += ' selected';

    let dotHtml = '';
    if (books.length) {
      dotHtml = '<div class="cal-dots">';
      const show = Math.min(books.length, 3);
      for (let i = 0; i < show; i++) dotHtml += '<div class="cal-dot"></div>';
      if (books.length > 3) dotHtml += `<span class="cal-dot-more">+${books.length - 3}</span>`;
      dotHtml += '</div>';
    }
    const preview = books.length === 1 ? `<div class="cal-book-preview">${x(books[0].title)}</div>` : '';
    const click   = books.length ? `onclick="calSelect('${dateStr}')"` : '';

    html += `<div class="${cls}" ${click}><span class="cal-day-num">${d}</span>${dotHtml}${preview}</div>`;
  }

  const trailing = (firstWeekday + daysInMonth) % 7;
  if (trailing) for (let i = 1; i <= 7 - trailing; i++) {
    html += `<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;
  }
  html += '</div>';

  const listBooks  = calSelDate ? (byDate[calSelDate] || []) : monthBooks;
  const headerText = calSelDate
    ? (() => { const [,m,d] = calSelDate.split('-'); return `${parseInt(m)} 月 ${parseInt(d)} 日`; })()
    : `${MONTH_NAMES[calMonth]}閱讀清單`;

  html += `<div class="cal-section-header">${headerText}</div>`;

  if (listBooks.length === 0) {
    html += `<div class="cal-no-books">${calSelDate ? '這天沒有讀書紀錄' : '這個月還沒有讀書紀錄'}</div>`;
  } else {
    html += listBooks.map(b => {
      const stars = b.rating ? '★'.repeat(b.rating) + '<span class="empty-star">' + '★'.repeat(5 - b.rating) + '</span>' : '';
      const hl    = calSelDate && b.finishedDate === calSelDate;
      return `<div class="cal-book-row${hl ? ' highlighted' : ''}">
        <div class="cal-book-date">${b.finishedDate ? shortDate(b.finishedDate) : '—'}</div>
        <div class="cal-book-body">
          <div class="cal-book-title">${x(b.title)}</div>
          ${b.author ? `<div class="cal-book-author">${x(b.author)}</div>` : ''}
          ${stars ? `<div class="stars-display" style="font-size:13px;margin-top:4px;">${stars}</div>` : ''}
          ${b.notes ? `<div class="cal-book-notes">${x(b.notes)}</div>` : ''}
        </div>
        <button class="btn-sm btn-view" onclick="openViewModal('${b.id}')">編輯</button>
      </div>`;
    }).join('');
  }

  document.getElementById('calendarPanel').innerHTML = html;
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  calSelDate = null; renderCalendar();
}
function calGoToday()       { calYear = new Date().getFullYear(); calMonth = new Date().getMonth(); calSelDate = null; renderCalendar(); }
function calSelect(dateStr) { calSelDate = calSelDate === dateStr ? null : dateStr; renderCalendar(); }

// ── Modal helpers ─────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }
function onOverlayClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
function hideErr(id) { document.getElementById(id).style.display = 'none'; }

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Keyboard ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['addOverlay','finishOverlay','viewOverlay'].forEach(id => {
      if (document.getElementById(id).classList.contains('open')) closeModal(id);
    });
  }
  if (e.key === 'Enter' && !e.shiftKey
      && document.getElementById('addOverlay').classList.contains('open')
      && document.activeElement.tagName !== 'TEXTAREA'
      && document.activeElement.tagName !== 'BUTTON') {
    submitAdd();
  }
});

// ── Helpers ───────────────────────────────────────────
function x(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function today()     { return new Date().toISOString().slice(0, 10); }
function fmtDate(d)  { if (!d) return ''; const [y,m,day] = d.split('-'); return `${y}/${parseInt(m)}/${parseInt(day)}`; }
function shortDate(d){ if (!d) return ''; const [,m,day]  = d.split('-'); return `${parseInt(m)}/${parseInt(day)}`; }

// ── Init ──────────────────────────────────────────────
load();
renderAll();

// ── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
