<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喝水提醒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #eef4fb;
    --surface:       #f6faff;
    --surface2:      #eaf2fc;
    --primary:       #3a7abf;
    --primary-dark:  #255a96;
    --primary-light: #d0e6f8;
    --text:          #162435;
    --text-2:        #4a6a8a;
    --text-3:        #8aaac8;
    --border:        #c6daf0;
    --water:         #4a9ee8;
    --water-light:   #d6edfb;
    --success:       #3a8a5a;
    --success-light: #d6f0e2;
    --warning:       #c98a2a;
    --warning-light: #fdf0d8;
    --danger:        #b04040;
    --danger-light:  #fbe8e8;
    --radius:        8px;
    --shadow:        0 1px 4px rgba(30,70,120,0.08);
    --shadow-md:     0 4px 14px rgba(30,70,120,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', 'Georgia', serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(180,220,255,0.5) 0%, transparent 60%),
      radial-gradient(ellipse at 85% 100%, rgba(100,170,240,0.15) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner {
    max-width: 720px; margin: 0 auto;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .header-title { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: 0.05em; }
  .header-sub   { font-size: 13px; color: var(--text-3); letter-spacing: 0.08em; margin-top: 1px; }
  .btn-settings {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-2);
    width: 38px; height: 38px; border-radius: 50%; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s; flex-shrink: 0;
  }
  .btn-settings:hover { background: var(--primary-light); color: var(--primary); }

  /* ── Tabs ── */
  .tabs {
    max-width: 720px; margin: 0 auto;
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface); padding: 0 20px;
  }
  .tab {
    padding: 10px 18px; border: none; background: transparent;
    font-family: inherit; font-size: 15px; font-weight: 500; color: var(--text-3);
    cursor: pointer; letter-spacing: 0.04em;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    white-space: nowrap; transition: color 0.2s, border-color 0.2s;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

  /* ── Container ── */
  .container { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Water Bottle Visual ── */
  .bottle-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px; margin-bottom: 20px;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 28px;
  }
  .bottle-wrap { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bottle-svg  { width: 72px; height: 130px; }
  .bottle-label { font-size: 12px; color: var(--text-3); letter-spacing: 0.06em; }
  .bottle-info { flex: 1; min-width: 0; }
  .bottle-amount {
    font-size: 48px; font-weight: 700; line-height: 1;
    color: var(--primary); letter-spacing: -0.02em;
  }
  .bottle-unit    { font-size: 18px; font-weight: 400; color: var(--text-2); margin-left: 4px; }
  .bottle-goal    { font-size: 14px; color: var(--text-3); margin-top: 4px; letter-spacing: 0.04em; }
  .bottle-percent { font-size: 22px; font-weight: 600; color: var(--water); margin-top: 6px; }

  /* ── Progress Bar ── */
  .progress-wrap { margin-top: 14px; }
  .progress-track { height: 14px; background: var(--primary-light); border-radius: 7px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 7px;
    background: linear-gradient(90deg, #5bb8f5 0%, #2d88d8 100%);
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
    border-radius: 7px;
  }
  .progress-labels {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-3); margin-top: 5px;
  }

  /* ── Quick Add ── */
  .quick-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .section-title { font-size: 14px; font-weight: 600; color: var(--text-2); letter-spacing: 0.08em; margin-bottom: 14px; }
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-quick {
    flex: 1; min-width: 70px; padding: 10px 8px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    font-family: inherit; font-size: 15px; font-weight: 600; color: var(--primary);
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .btn-quick:hover  { background: var(--primary-light); border-color: var(--primary); }
  .btn-quick:active { transform: scale(0.95); }
  .btn-quick-label  { font-size: 11px; font-weight: 400; color: var(--text-3); display: block; margin-top: 2px; }

  .custom-add { display: flex; gap: 8px; margin-top: 12px; }
  .custom-add input {
    flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); font-family: inherit; font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .custom-add input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(58,122,191,0.12); }
  .btn-add-custom {
    padding: 9px 18px; border-radius: var(--radius);
    background: var(--primary); color: #fff; border: none;
    font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn-add-custom:hover  { background: var(--primary-dark); }
  .btn-add-custom:active { transform: scale(0.97); }

  /* ── Reminder ── */
  .reminder-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .reminder-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .reminder-status { flex: 1; min-width: 0; }
  .reminder-countdown {
    font-size: 32px; font-weight: 700; color: var(--primary);
    letter-spacing: -0.01em; line-height: 1;
  }
  .reminder-countdown.urgent { color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .reminder-label { font-size: 13px; color: var(--text-3); margin-top: 3px; letter-spacing: 0.04em; }
  .reminder-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .interval-select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); font-family: inherit; font-size: 14px; color: var(--text);
    cursor: pointer; outline: none;
  }
  .btn-toggle {
    padding: 8px 14px; border-radius: var(--radius); border: 1px solid transparent;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-toggle.on  { background: var(--success); color: #fff; border-color: var(--success); }
  .btn-toggle.off { background: var(--surface2); color: var(--text-2); border-color: var(--border); }
  .btn-toggle.on:hover  { background: #2d7048; }
  .btn-toggle.off:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

  /* ── Log ── */
  .log-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow);
  }
  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .btn-reset {
    background: transparent; border: 1px solid var(--border); color: var(--text-3);
    padding: 4px 10px; border-radius: var(--radius); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
  .log-list { display: flex; flex-direction: column; gap: 6px; }
  .log-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--water); border-radius: 0 var(--radius) var(--radius) 0;
    transition: box-shadow 0.15s;
  }
  .log-item:hover { box-shadow: var(--shadow-md); }
  .log-icon   { font-size: 18px; flex-shrink: 0; }
  .log-body   { flex: 1; min-width: 0; }
  .log-amount { font-size: 15px; font-weight: 600; color: var(--primary); }
  .log-time   { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .btn-log-del {
    background: transparent; border: none; color: var(--text-3); font-size: 14px;
    cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: color 0.15s, background 0.15s; flex-shrink: 0;
  }
  .btn-log-del:hover { color: var(--danger); background: var(--danger-light); }
  .log-empty { text-align: center; padding: 32px 16px; color: var(--text-3); font-size: 15px; letter-spacing: 0.04em; }

  /* ── Achievement Banner ── */
  .achieve-banner {
    display: none; align-items: center; gap: 12px;
    background: var(--success-light); border: 1px solid #a0d8b8;
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 20px;
  }
  .achieve-banner.show { display: flex; }
  .achieve-icon { font-size: 28px; flex-shrink: 0; }
  .achieve-text { font-size: 15px; font-weight: 600; color: var(--success); letter-spacing: 0.04em; }

  /* ══════════════════════════════════════════
     History Calendar
  ══════════════════════════════════════════ */
  .cal-nav-row {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .cal-nav {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    width: 34px; height: 34px; font-size: 20px; color: var(--text-2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s; flex-shrink: 0;
  }
  .cal-nav:hover { background: var(--primary-light); color: var(--primary); }
  .cal-month-info { text-align: center; }
  .cal-month-title {
    font-size: 19px; font-weight: 700; color: var(--primary); letter-spacing: 0.06em;
    cursor: pointer;
  }
  .cal-month-title:hover { text-decoration: underline; text-underline-offset: 3px; }
  .cal-month-sub { font-size: 13px; color: var(--text-3); letter-spacing: 0.05em; margin-top: 2px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 24px; }
  .cal-weekday {
    text-align: center; font-size: 12px; color: var(--text-3);
    letter-spacing: 0.06em; padding: 4px 0 10px;
  }
  .cal-weekday:first-child { color: #b07a7a; }
  .cal-weekday:last-child  { color: #7a90b0; }

  .cal-day {
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 5px 2px 4px; border-radius: var(--radius); min-height: 62px;
    cursor: default; transition: background 0.15s, box-shadow 0.15s; position: relative;
    border: 1px solid transparent;
  }
  .cal-day.other-month { opacity: 0.25; }
  .cal-day.has-data    { cursor: pointer; border-color: var(--border); }
  .cal-day.has-data:hover { box-shadow: var(--shadow-md); }
  .cal-day.today .cal-day-num {
    background: var(--primary-light); color: var(--primary); font-weight: 700;
    border-radius: 50%; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-day.selected { border-color: var(--primary) !important; box-shadow: 0 0 0 2px rgba(58,122,191,0.3) !important; }

  /* Heat map colors */
  .cal-day.heat-0   { background: transparent; }
  .cal-day.heat-25  { background: rgba(74,158,232,0.12); }
  .cal-day.heat-50  { background: rgba(74,158,232,0.28); }
  .cal-day.heat-75  { background: rgba(74,158,232,0.5); }
  .cal-day.heat-100 { background: rgba(58,138,90,0.25); }

  .cal-day-num { font-size: 13px; line-height: 1; color: var(--text); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .cal-day:nth-child(7n+1) .cal-day-num { color: #a05050; }
  .cal-day:nth-child(7n)   .cal-day-num { color: #5070a0; }

  .cal-day-ml {
    font-size: 10px; color: var(--text-3); margin-top: 4px; font-weight: 500;
    text-align: center; line-height: 1.2;
  }
  .cal-day-pct {
    font-size: 10px; font-weight: 600; margin-top: 2px;
    color: var(--text-3);
  }
  .cal-day.heat-100 .cal-day-pct { color: var(--success); }
  .cal-day.heat-75  .cal-day-pct { color: var(--water); }

  /* History detail */
  .cal-section-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    font-size: 13px; color: var(--text-3); letter-spacing: 0.08em;
  }
  .cal-section-header::before, .cal-section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .hist-day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .hist-day-card.selected-card { border-color: var(--primary); box-shadow: var(--shadow-md); }
  .hist-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .hist-day-date   { font-size: 15px; font-weight: 700; color: var(--text); }
  .hist-day-total  { font-size: 15px; font-weight: 600; color: var(--primary); }
  .hist-day-track  { height: 8px; background: var(--primary-light); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .hist-day-fill   {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #5bb8f5 0%, #2d88d8 100%);
    transition: width 0.5s;
  }
  .hist-day-fill.goal-met { background: linear-gradient(90deg, #5bcf8a 0%, #2d8a5a 100%); }
  .hist-day-entries { display: flex; flex-wrap: wrap; gap: 6px; }
  .hist-entry-chip {
    font-size: 12px; padding: 2px 8px; border-radius: 10px;
    background: var(--water-light); color: var(--water); font-weight: 500;
  }
  .cal-no-data { text-align: center; padding: 40px 16px; color: var(--text-3); font-size: 15px; }

  /* Monthly stats */
  .month-stats {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .month-stat {
    flex: 1; min-width: 100px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; box-shadow: var(--shadow); text-align: center;
  }
  .month-stat-num   { font-size: 22px; font-weight: 700; color: var(--primary); line-height: 1; }
  .month-stat-label { font-size: 12px; color: var(--text-3); margin-top: 4px; letter-spacing: 0.04em; }

  /* Heat legend */
  .heat-legend { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; font-size: 12px; color: var(--text-3); }
  .heat-box { width: 14px; height: 14px; border-radius: 3px; }

  /* ══ Reminder Popup Modal ══ */
  .reminder-popup-overlay {
    position: fixed; inset: 0; background: rgba(20,50,90,0.55); z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .reminder-popup-overlay.open { opacity: 1; pointer-events: all; }
  .reminder-popup {
    background: var(--surface); border-radius: 16px; padding: 36px 32px;
    width: 90%; max-width: 380px; text-align: center;
    transform: scale(0.85) translateY(20px); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(20,60,120,0.25);
  }
  .reminder-popup-overlay.open .reminder-popup { transform: scale(1) translateY(0); }

  .popup-wave {
    font-size: 64px; margin-bottom: 8px; display: block;
    animation: wave-bounce 1.2s ease-in-out infinite alternate;
  }
  @keyframes wave-bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

  .popup-title {
    font-size: 22px; font-weight: 700; color: var(--primary);
    margin-bottom: 6px; letter-spacing: 0.04em;
  }
  .popup-subtitle { font-size: 14px; color: var(--text-3); margin-bottom: 24px; letter-spacing: 0.04em; }
  .popup-quick-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .popup-btn-quick {
    padding: 10px 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--primary);
    cursor: pointer; transition: all 0.15s;
  }
  .popup-btn-quick:hover  { background: var(--primary); color: #fff; border-color: var(--primary); }
  .popup-btn-quick:active { transform: scale(0.95); }
  .popup-custom { display: flex; gap: 8px; margin-bottom: 20px; }
  .popup-custom input {
    flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); font-family: inherit; font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .popup-custom input:focus { border-color: var(--primary); }
  .popup-custom-btn {
    padding: 9px 14px; background: var(--primary); color: #fff; border: none;
    border-radius: var(--radius); font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .popup-custom-btn:hover { background: var(--primary-dark); }
  .popup-actions { display: flex; gap: 8px; justify-content: center; }
  .btn-snooze {
    padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface2); font-family: inherit; font-size: 14px; color: var(--text-2);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-snooze:hover { background: var(--warning-light); border-color: var(--warning); color: var(--warning); }
  .btn-popup-dismiss {
    padding: 8px 18px; border-radius: var(--radius); border: 1px solid var(--border);
    background: transparent; font-family: inherit; font-size: 14px; color: var(--text-3);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-popup-dismiss:hover { color: var(--text-2); background: var(--surface2); }

  /* ── General Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,50,90,0.45); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  @media (min-width: 520px) { .modal-overlay { align-items: center; } }
  .modal {
    background: var(--surface); border-radius: 10px 10px 0 0; padding: 26px 24px;
    width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.3s ease;
    box-shadow: 0 -4px 30px rgba(30,70,120,0.15);
  }
  @media (min-width: 520px) {
    .modal { border-radius: 10px; transform: translateY(12px); box-shadow: var(--shadow-md); }
    .modal-overlay.open .modal { transform: translateY(0); }
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--primary); }
  .btn-close {
    background: var(--bg); border: 1px solid var(--border); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; color: var(--text-2);
    transition: background 0.15s;
  }
  .btn-close:hover { background: var(--border); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text-2); letter-spacing: 0.05em; margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); font-family: inherit; font-size: 15px; color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(58,122,191,0.12); }
  .form-hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }
  .form-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  }
  .btn-lg { padding: 9px 20px; border-radius: var(--radius); font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
  .btn-cancel  { background: var(--bg); color: var(--text-2); border-color: var(--border); }
  .btn-cancel:hover { background: var(--border); }
  .btn-confirm { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn-confirm:hover { background: var(--primary-dark); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: #f0f8ff; padding: 10px 22px; border-radius: 20px;
    font-size: 15px; letter-spacing: 0.04em; z-index: 999;
    opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease;
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-title">喝水提醒</div>
      <div class="header-sub" id="dateLabel">今日補水紀錄</div>
    </div>
    <button class="btn-settings" onclick="openSettings()" title="設定">⚙</button>
  </div>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tabToday"   onclick="switchTab('today')">今日</button>
  <button class="tab"        id="tabHistory" onclick="switchTab('history')">歷史紀錄</button>
</div>

<div class="container">

  <!-- ══ TODAY TAB ══ -->
  <div class="tab-content active" id="panelToday">

    <!-- 達標提示 -->
    <div class="achieve-banner" id="achieveBanner">
      <div class="achieve-icon">🎉</div>
      <div class="achieve-text">太棒了！今日飲水目標已達成！繼續保持！</div>
    </div>

    <!-- 水瓶 + 進度 -->
    <div class="bottle-section">
      <div class="bottle-wrap">
        <svg class="bottle-svg" viewBox="0 0 72 130" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="bottleClip">
              <path d="M20,18 L16,32 C10,36 8,44 8,52 L8,112 C8,120 14,126 22,126 L50,126 C58,126 64,120 64,112 L64,52 C64,44 62,36 56,32 L52,18 Z"/>
            </clipPath>
            <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#5bb8f5"/>
              <stop offset="100%" stop-color="#2d88d8"/>
            </linearGradient>
          </defs>
          <path d="M24,6 L48,6 L48,18 L52,18 L56,32 C62,36 64,44 64,52 L64,112 C64,120 58,126 50,126 L22,126 C14,126 8,120 8,112 L8,52 C8,44 10,36 16,32 L20,18 L24,18 Z"
                fill="#e8f3fc" stroke="#9cc6e8" stroke-width="1.5"/>
          <rect id="waterRect" x="8" y="126" width="56" height="0"
                fill="url(#waterGrad)" clip-path="url(#bottleClip)" opacity="0.85"
                style="transition: y 0.6s cubic-bezier(0.34,1.56,0.64,1), height 0.6s cubic-bezier(0.34,1.56,0.64,1)"/>
          <rect id="waveRect" x="8" y="124" width="56" height="5"
                fill="#5bb8f5" clip-path="url(#bottleClip)" opacity="0.5"
                style="transition: y 0.6s cubic-bezier(0.34,1.56,0.64,1)"/>
          <path d="M20,40 Q22,70 20,100" stroke="rgba(255,255,255,0.5)" stroke-width="3" fill="none" stroke-linecap="round"/>
          <line x1="60" y1="78" x2="64" y2="78" stroke="#9cc6e8" stroke-width="1"/>
          <line x1="62" y1="62" x2="64" y2="62" stroke="#9cc6e8" stroke-width="1"/>
          <line x1="60" y1="46" x2="64" y2="46" stroke="#9cc6e8" stroke-width="1"/>
          <rect x="26" y="2" width="20" height="7" rx="3" fill="#3a7abf" opacity="0.8"/>
        </svg>
        <div class="bottle-label">今日水量</div>
      </div>

      <div class="bottle-info">
        <div>
          <span class="bottle-amount" id="currentAmount">0</span>
          <span class="bottle-unit">ml</span>
        </div>
        <div class="bottle-goal" id="goalLabel">目標：2000 ml</div>
        <div class="bottle-percent" id="percentLabel">0%</div>
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <div class="progress-labels">
            <span>0</span>
            <span id="halfGoal">1000 ml</span>
            <span id="fullGoal">2000 ml</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 快速記錄 -->
    <div class="quick-section">
      <div class="section-title">快速記錄</div>
      <div class="quick-btns">
        <button class="btn-quick" onclick="addWater(100)">100<br><span class="btn-quick-label">小口</span></button>
        <button class="btn-quick" onclick="addWater(200)">200<br><span class="btn-quick-label">半杯</span></button>
        <button class="btn-quick" onclick="addWater(250)">250<br><span class="btn-quick-label">一杯</span></button>
        <button class="btn-quick" onclick="addWater(350)">350<br><span class="btn-quick-label">大杯</span></button>
        <button class="btn-quick" onclick="addWater(500)">500<br><span class="btn-quick-label">一瓶</span></button>
      </div>
      <div class="custom-add">
        <input type="number" id="customMl" placeholder="自訂 ml" min="1" max="2000"
               onkeydown="if(event.key==='Enter') addCustom()">
        <button class="btn-add-custom" onclick="addCustom()">記錄</button>
      </div>
    </div>

    <!-- 提醒計時器 -->
    <div class="reminder-section">
      <div class="section-title">喝水提醒</div>
      <div class="reminder-row">
        <div class="reminder-status">
          <div class="reminder-countdown" id="countdown">--:--</div>
          <div class="reminder-label" id="reminderLabel">尚未開啟提醒</div>
        </div>
        <div class="reminder-controls">
          <select class="interval-select" id="intervalSelect" onchange="updateInterval()">
            <option value="20">20 分鐘</option>
            <option value="30" selected>30 分鐘</option>
            <option value="45">45 分鐘</option>
            <option value="60">60 分鐘</option>
            <option value="90">90 分鐘</option>
          </select>
          <button class="btn-toggle off" id="reminderBtn" onclick="toggleReminder()">開啟</button>
        </div>
      </div>
    </div>

    <!-- 今日紀錄 -->
    <div class="log-section">
      <div class="log-header">
        <div class="section-title" style="margin-bottom:0">今日紀錄</div>
        <button class="btn-reset" onclick="confirmReset()">重置今日</button>
      </div>
      <div class="log-list" id="logList">
        <div class="log-empty">今天還沒有喝水紀錄<br>趕快喝一杯吧！</div>
      </div>
    </div>

  </div><!-- /panelToday -->


  <!-- ══ HISTORY TAB ══ -->
  <div class="tab-content" id="panelHistory">

    <!-- Monthly stats -->
    <div class="month-stats" id="monthStats"></div>

    <!-- Calendar nav -->
    <div class="quick-section" style="padding-bottom: 20px;">
      <div class="cal-nav-row">
        <button class="cal-nav" onclick="calMove(-1)">‹</button>
        <div class="cal-month-info">
          <div class="cal-month-title" id="calMonthTitle" onclick="calGoToday()" title="回到本月"></div>
          <div class="cal-month-sub"  id="calMonthSub"></div>
        </div>
        <button class="cal-nav" onclick="calMove(1)">›</button>
      </div>

      <!-- Heat legend -->
      <div class="heat-legend">
        <span>飲水量：</span>
        <div class="heat-box" style="background:rgba(74,158,232,0.12)"></div><span>1%</span>
        <div class="heat-box" style="background:rgba(74,158,232,0.28)"></div><span>25%</span>
        <div class="heat-box" style="background:rgba(74,158,232,0.5)"></div><span>50%</span>
        <div class="heat-box" style="background:rgba(58,138,90,0.25)"></div><span>達標</span>
      </div>

      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Day detail -->
    <div class="cal-section-header" id="calDetailHeader">詳細紀錄</div>
    <div id="calDetail"></div>

  </div><!-- /panelHistory -->

</div><!-- /container -->

<!-- Toast -->
<div class="toast" id="toast"></div>


<!-- ══ Reminder Popup ══ -->
<div class="reminder-popup-overlay" id="reminderPopup">
  <div class="reminder-popup">
    <span class="popup-wave">💧</span>
    <div class="popup-title">該喝水了！</div>
    <div class="popup-subtitle" id="popupSubtitle">距離上次喝水已超過 30 分鐘</div>
    <div class="popup-quick-btns">
      <button class="popup-btn-quick" onclick="popupAdd(100)">100 ml</button>
      <button class="popup-btn-quick" onclick="popupAdd(200)">200 ml</button>
      <button class="popup-btn-quick" onclick="popupAdd(250)">250 ml</button>
      <button class="popup-btn-quick" onclick="popupAdd(350)">350 ml</button>
      <button class="popup-btn-quick" onclick="popupAdd(500)">500 ml</button>
    </div>
    <div class="popup-custom">
      <input type="number" id="popupCustomMl" placeholder="自訂 ml" min="1" max="2000"
             onkeydown="if(event.key==='Enter') popupAddCustom()">
      <button class="popup-custom-btn" onclick="popupAddCustom()">記錄</button>
    </div>
    <div class="popup-actions">
      <button class="btn-snooze" onclick="snooze()">稍後提醒（10 分鐘後）</button>
      <button class="btn-popup-dismiss" onclick="closePopup()">關閉</button>
    </div>
  </div>
</div>


<!-- ══ Settings Modal ══ -->
<div class="modal-overlay" id="settingsOverlay" onclick="onOverlayClick(event,'settingsOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">設定</div>
      <button class="btn-close" onclick="closeModal('settingsOverlay')">✕</button>
    </div>
    <div class="form-group">
      <label>每日飲水目標（ml）</label>
      <input type="number" id="settingGoal" value="2000" min="500" max="5000" step="100">
      <div class="form-hint">建議每日飲水量 1500～3000 ml</div>
    </div>
    <div class="form-group">
      <label>提醒音效</label>
      <select id="settingSoundType">
        <option value="beep">輕柔提示音</option>
        <option value="drop">水滴聲</option>
        <option value="none">無聲音</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-lg btn-cancel" onclick="closeModal('settingsOverlay')">取消</button>
      <button class="btn-lg btn-confirm" onclick="saveSettings()">儲存</button>
    </div>
  </div>
</div>


<script>
// ══════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════
let settings    = { goal: 2000, soundType: 'beep' };
let allLogs     = {};   // { "2026-04-20": [{ml, time}, ...], ... }
let reminderOn  = false;
let intervalMin = 30;
let countdownTimer  = null;
let reminderEndTime = null;

// Calendar state
const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const WEEKDAYS    = ['日','一','二','三','四','五','六'];
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelDate = null;

// ══════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════
function init() {
  loadData();
  setDateLabel();
  renderToday();
  document.getElementById('intervalSelect').value = String(intervalMin);
  scheduleAutoReset();
}

function setDateLabel() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('dateLabel').textContent =
    `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日（星期${days[d.getDay()]}）`;
}

// ══════════════════════════════════════════════════
//  Persistence  (multi-day)
// ══════════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem('waterReminder_v2');
    if (raw) {
      const p = JSON.parse(raw);
      allLogs     = p.allLogs     || {};
      settings    = { ...settings, ...(p.settings || {}) };
      intervalMin = p.intervalMin || 30;
    } else {
      // Migrate from v1 if exists
      const v1 = localStorage.getItem('waterReminder_v1');
      if (v1) {
        const p = JSON.parse(v1);
        if (p.date && Array.isArray(p.log)) allLogs[p.date] = p.log;
        settings    = { ...settings, ...(p.settings || {}) };
        intervalMin = p.intervalMin || 30;
      }
    }
  } catch(e) {}
  document.getElementById('settingGoal').value       = settings.goal;
  document.getElementById('settingSoundType').value  = settings.soundType || 'beep';
}

function saveData() {
  localStorage.setItem('waterReminder_v2', JSON.stringify({ allLogs, settings, intervalMin }));
}

function todayStr() { return new Date().toISOString().slice(0, 10); }
function todayLog() { return allLogs[todayStr()] || []; }
function setTodayLog(arr) { allLogs[todayStr()] = arr; }

// ══════════════════════════════════════════════════
//  Tab
// ══════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tabToday').classList.toggle('active',   tab === 'today');
  document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
  document.getElementById('panelToday').classList.toggle('active',   tab === 'today');
  document.getElementById('panelHistory').classList.toggle('active', tab === 'history');
  if (tab === 'history') renderHistory();
}

// ══════════════════════════════════════════════════
//  Today render
// ══════════════════════════════════════════════════
function renderToday() {
  const log   = todayLog();
  const total = log.reduce((s, e) => s + e.ml, 0);
  const goal  = settings.goal;
  const pct   = Math.min(Math.round(total / goal * 100), 100);

  document.getElementById('currentAmount').textContent = total;
  document.getElementById('goalLabel').textContent     = `目標：${goal} ml`;
  document.getElementById('percentLabel').textContent  = `${pct}%`;
  document.getElementById('halfGoal').textContent      = `${Math.round(goal/2)} ml`;
  document.getElementById('fullGoal').textContent      = `${goal} ml`;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('achieveBanner').classList.toggle('show', pct >= 100);

  // SVG bottle: body from y=18 to y=126, total height=108
  const fillH = Math.round(108 * pct / 100);
  const fillY = 126 - fillH;
  document.getElementById('waterRect').setAttribute('y', fillY);
  document.getElementById('waterRect').setAttribute('height', fillH + 2);
  document.getElementById('waveRect').setAttribute('y', fillY - 2);

  renderLog();
}

function renderLog() {
  const log  = todayLog();
  const list = document.getElementById('logList');
  if (log.length === 0) {
    list.innerHTML = '<div class="log-empty">今天還沒有喝水紀錄<br>趕快喝一杯吧！</div>';
    return;
  }
  list.innerHTML = [...log].reverse().map((e, ri) => {
    const i = log.length - 1 - ri;
    return `<div class="log-item">
      <div class="log-icon">💧</div>
      <div class="log-body">
        <div class="log-amount">+ ${e.ml} ml</div>
        <div class="log-time">${e.time}</div>
      </div>
      <button class="btn-log-del" onclick="deleteLog(${i})" title="刪除">✕</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
//  Add / Delete water
// ══════════════════════════════════════════════════
function addWater(ml) {
  const now  = new Date();
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const log  = todayLog();
  log.push({ ml, time });
  setTodayLog(log);
  saveData();
  renderToday();
  resetCountdown();
  toast(`已記錄 ${ml} ml`);
}

function addCustom() {
  const val = parseInt(document.getElementById('customMl').value);
  if (!val || val <= 0) { toast('請輸入有效的水量'); return; }
  if (val > 2000) { toast('單次最多 2000 ml'); return; }
  document.getElementById('customMl').value = '';
  addWater(val);
}

function deleteLog(i) {
  const log = todayLog();
  log.splice(i, 1);
  setTodayLog(log);
  saveData(); renderToday();
}

function confirmReset() {
  if (!confirm('確定要清除今日所有飲水紀錄？')) return;
  setTodayLog([]);
  saveData(); renderToday();
  toast('今日紀錄已重置');
}

// ══════════════════════════════════════════════════
//  Reminder timer
// ══════════════════════════════════════════════════
function toggleReminder() {
  reminderOn ? stopReminder() : startReminder();
}

function startReminder() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  reminderOn = true;
  resetCountdown();
  document.getElementById('reminderBtn').textContent = '關閉';
  document.getElementById('reminderBtn').className   = 'btn-toggle on';
  document.getElementById('reminderLabel').textContent = `每 ${intervalMin} 分鐘提醒一次`;
  toast('提醒已開啟');
}

function stopReminder() {
  reminderOn = false;
  clearInterval(countdownTimer);
  countdownTimer = null;
  document.getElementById('reminderBtn').textContent      = '開啟';
  document.getElementById('reminderBtn').className        = 'btn-toggle off';
  document.getElementById('countdown').textContent        = '--:--';
  document.getElementById('countdown').classList.remove('urgent');
  document.getElementById('reminderLabel').textContent    = '尚未開啟提醒';
}

function resetCountdown() {
  if (!reminderOn) return;
  clearInterval(countdownTimer);
  reminderEndTime = Date.now() + intervalMin * 60 * 1000;
  document.getElementById('countdown').classList.remove('urgent');
  tickCountdown();
  countdownTimer = setInterval(tickCountdown, 1000);
}

function tickCountdown() {
  const remaining = Math.max(0, Math.round((reminderEndTime - Date.now()) / 1000));
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  document.getElementById('countdown').textContent = `${pad(m)}:${pad(s)}`;
  if (remaining <= 60) document.getElementById('countdown').classList.add('urgent');
  if (remaining === 0) { fireReminder(); resetCountdown(); }
}

function updateInterval() {
  intervalMin = parseInt(document.getElementById('intervalSelect').value);
  saveData();
  if (reminderOn) {
    document.getElementById('reminderLabel').textContent = `每 ${intervalMin} 分鐘提醒一次`;
    resetCountdown();
  }
}

function fireReminder() {
  playSound();
  openReminderPopup();
  // System notification as backup
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('💧 該喝水了！', {
      body: `你已經 ${intervalMin} 分鐘沒喝水了，記得補充水分！`,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💧</text></svg>'
    });
  }
}

// ══════════════════════════════════════════════════
//  Reminder Popup
// ══════════════════════════════════════════════════
function openReminderPopup() {
  document.getElementById('popupSubtitle').textContent = `距離上次喝水已超過 ${intervalMin} 分鐘`;
  document.getElementById('reminderPopup').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePopup() {
  document.getElementById('reminderPopup').classList.remove('open');
  document.body.style.overflow = '';
}

function popupAdd(ml) {
  addWater(ml);
  closePopup();
}

function popupAddCustom() {
  const val = parseInt(document.getElementById('popupCustomMl').value);
  if (!val || val <= 0) { toast('請輸入有效的水量'); return; }
  if (val > 2000) { toast('單次最多 2000 ml'); return; }
  document.getElementById('popupCustomMl').value = '';
  popupAdd(val);
}

function snooze() {
  closePopup();
  // Temporarily override countdown to 10 min
  reminderEndTime = Date.now() + 10 * 60 * 1000;
  document.getElementById('countdown').classList.remove('urgent');
  toast('10 分鐘後再提醒');
}

// ══════════════════════════════════════════════════
//  History Calendar
// ══════════════════════════════════════════════════
function renderHistory() {
  const pad2   = n => String(n).padStart(2, '0');
  const goal   = settings.goal;
  const today  = todayStr();

  // Monthly stats
  const monthKey = `${calYear}-${pad2(calMonth + 1)}`;
  const monthDays = Object.entries(allLogs)
    .filter(([d]) => d.startsWith(monthKey))
    .map(([d, log]) => ({ date: d, total: log.reduce((s,e) => s + e.ml, 0) }));

  const daysWithData  = monthDays.filter(d => d.total > 0).length;
  const daysGoalMet   = monthDays.filter(d => d.total >= goal).length;
  const avgMl         = daysWithData ? Math.round(monthDays.filter(d=>d.total>0).reduce((s,d)=>s+d.total,0) / daysWithData) : 0;
  const totalMl       = monthDays.reduce((s,d) => s + d.total, 0);

  document.getElementById('monthStats').innerHTML = `
    <div class="month-stat"><div class="month-stat-num">${daysWithData}</div><div class="month-stat-label">有記錄天數</div></div>
    <div class="month-stat"><div class="month-stat-num">${daysGoalMet}</div><div class="month-stat-label">達標天數</div></div>
    <div class="month-stat"><div class="month-stat-num">${avgMl ? avgMl+'ml' : '—'}</div><div class="month-stat-label">日均飲水</div></div>
    <div class="month-stat"><div class="month-stat-num">${totalMl ? (totalMl/1000).toFixed(1)+'L' : '—'}</div><div class="month-stat-label">本月總計</div></div>
  `;

  // Month title
  document.getElementById('calMonthTitle').textContent = `${calYear} 年 ${MONTH_NAMES[calMonth]}`;
  document.getElementById('calMonthSub').textContent   = daysGoalMet ? `本月 ${daysGoalMet} 天達標` : '本月尚無達標紀錄';

  // Build calendar grid
  const firstWD   = new Date(calYear, calMonth, 1).getDay();
  const daysInMon = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrv = new Date(calYear, calMonth, 0).getDate();

  // Build lookup
  const byDate = {};
  Object.entries(allLogs).forEach(([d, log]) => {
    byDate[d] = log.reduce((s,e) => s + e.ml, 0);
  });

  let html = WEEKDAYS.map(d => `<div class="cal-weekday">${d}</div>`).join('');

  // Prev month padding
  for (let i = 0; i < firstWD; i++) {
    html += `<div class="cal-day other-month"><span class="cal-day-num">${daysInPrv - firstWD + 1 + i}</span></div>`;
  }

  // Current month days
  for (let d = 1; d <= daysInMon; d++) {
    const dateStr = `${calYear}-${pad2(calMonth + 1)}-${pad2(d)}`;
    const ml      = byDate[dateStr] || 0;
    const pct     = Math.min(ml / goal * 100, 100);
    const isToday = dateStr === today;
    const isSel   = dateStr === calSelDate;
    const hasData = ml > 0;

    let heat = 'heat-0';
    if (pct >= 100)     heat = 'heat-100';
    else if (pct >= 75) heat = 'heat-75';
    else if (pct >= 50) heat = 'heat-50';
    else if (pct >= 25) heat = 'heat-25';
    else if (pct > 0)   heat = 'heat-25';

    const cls = ['cal-day', heat, isToday ? 'today' : '', hasData ? 'has-data' : '', isSel ? 'selected' : ''].filter(Boolean).join(' ');
    const clickAttr = hasData ? `onclick="calSelect('${dateStr}')"` : '';

    const mlLabel   = ml ? `<div class="cal-day-ml">${ml}ml</div>` : '';
    const pctLabel  = ml ? `<div class="cal-day-pct">${Math.round(pct)}%</div>` : '';

    html += `<div class="${cls}" ${clickAttr}>
      <span class="cal-day-num">${d}</span>
      ${mlLabel}${pctLabel}
    </div>`;
  }

  // Trailing
  const trailing = (firstWD + daysInMon) % 7;
  if (trailing) for (let i = 1; i <= 7 - trailing; i++) {
    html += `<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  renderCalDetail();
}

function renderCalDetail() {
  const goal = settings.goal;
  const header = document.getElementById('calDetailHeader');
  const detail = document.getElementById('calDetail');

  if (calSelDate) {
    const [, m, d] = calSelDate.split('-');
    header.textContent = `${parseInt(m)} 月 ${parseInt(d)} 日詳細紀錄`;
    const log   = allLogs[calSelDate] || [];
    const total = log.reduce((s,e) => s + e.ml, 0);
    if (log.length === 0) {
      detail.innerHTML = '<div class="cal-no-data">這天沒有喝水紀錄</div>';
      return;
    }
    const pct    = Math.min(total / goal * 100, 100);
    const goalMet = total >= goal;
    detail.innerHTML = `
      <div class="hist-day-card selected-card">
        <div class="hist-day-header">
          <div class="hist-day-date">${calSelDate}</div>
          <div class="hist-day-total">${total} ml（${Math.round(pct)}%）${goalMet ? '✓ 達標' : ''}</div>
        </div>
        <div class="hist-day-track">
          <div class="hist-day-fill ${goalMet ? 'goal-met' : ''}" style="width:${pct}%"></div>
        </div>
        <div class="hist-day-entries">
          ${log.map(e => `<span class="hist-entry-chip">${e.time} +${e.ml}ml</span>`).join('')}
        </div>
      </div>`;
    return;
  }

  // Show all days in the month that have data
  const pad2     = n => String(n).padStart(2, '0');
  const monthKey = `${calYear}-${pad2(calMonth + 1)}`;
  const days     = Object.entries(allLogs)
    .filter(([d, log]) => d.startsWith(monthKey) && log.length > 0)
    .sort(([a],[b]) => b.localeCompare(a));

  header.textContent = `${MONTH_NAMES[calMonth]}所有紀錄`;

  if (days.length === 0) {
    detail.innerHTML = '<div class="cal-no-data">這個月還沒有喝水紀錄</div>';
    return;
  }

  detail.innerHTML = days.map(([date, log]) => {
    const total   = log.reduce((s,e) => s + e.ml, 0);
    const pct     = Math.min(total / goal * 100, 100);
    const goalMet = total >= goal;
    const [, m, d] = date.split('-');
    return `
      <div class="hist-day-card">
        <div class="hist-day-header">
          <div class="hist-day-date">${parseInt(m)} 月 ${parseInt(d)} 日</div>
          <div class="hist-day-total">${total} ml ${goalMet ? '✓' : `(${Math.round(pct)}%)`}</div>
        </div>
        <div class="hist-day-track">
          <div class="hist-day-fill ${goalMet ? 'goal-met' : ''}" style="width:${pct}%"></div>
        </div>
        <div class="hist-day-entries">
          ${log.map(e => `<span class="hist-entry-chip">${e.time} +${e.ml}ml</span>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  calSelDate = null;
  renderHistory();
}

function calGoToday() {
  calYear  = new Date().getFullYear();
  calMonth = new Date().getMonth();
  calSelDate = null;
  renderHistory();
}

function calSelect(date) {
  calSelDate = calSelDate === date ? null : date;
  renderCalDetail();
  // Re-render grid to update selected style
  renderHistory();
}

// ══════════════════════════════════════════════════
//  Sound
// ══════════════════════════════════════════════════
function playSound() {
  const type = settings.soundType;
  if (type === 'none') return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'beep') {
      [0, 0.15, 0.3].forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = [880, 1100, 1320][i];
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, ctx.currentTime + t);
        gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.4);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.4);
      });
    } else if (type === 'drop') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════════
//  Settings
// ══════════════════════════════════════════════════
function openSettings() {
  document.getElementById('settingGoal').value      = settings.goal;
  document.getElementById('settingSoundType').value = settings.soundType || 'beep';
  openModal('settingsOverlay');
}

function saveSettings() {
  const g = parseInt(document.getElementById('settingGoal').value);
  if (!g || g < 500 || g > 5000) { alert('請輸入 500～5000 之間的目標水量'); return; }
  settings.goal      = g;
  settings.soundType = document.getElementById('settingSoundType').value;
  saveData(); renderToday();
  closeModal('settingsOverlay');
  toast('設定已儲存');
}

// ══════════════════════════════════════════════════
//  Modal helpers
// ══════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow = 'hidden'; }
function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }
function onOverlayClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ══════════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════
//  Keyboard
// ══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('settingsOverlay');
    closePopup();
  }
});

// ══════════════════════════════════════════════════
//  Midnight auto-reset
// ══════════════════════════════════════════════════
function scheduleAutoReset() {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  setTimeout(() => { setDateLabel(); renderToday(); scheduleAutoReset(); }, next - now);
}

// ══════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════
function pad(n) { return String(n).padStart(2, '0'); }

// ── Start ──
init();
</script>
