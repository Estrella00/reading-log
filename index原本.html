<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的書單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #f2ece1;
    --surface:       #fdfaf4;
    --surface2:      #f7f1e6;
    --primary:       #7c5c3c;
    --primary-dark:  #5c3e28;
    --primary-light: #ede3d8;
    --text:          #2c1f14;
    --text-2:        #7a6656;
    --text-3:        #b5a492;
    --border:        #ddd0bc;
    --gold:          #c9922a;
    --success:       #5a7a5a;
    --success-light: #e8efe8;
    --danger:        #9b5454;
    --danger-light:  #f5eded;
    --radius:        6px;
    --shadow:        0 1px 4px rgba(60,35,10,0.08);
    --shadow-md:     0 4px 14px rgba(60,35,10,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(255,240,210,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(200,170,130,0.15) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── Header ──────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-brand {}

  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    margin-top: 1px;
    font-weight: 400;
  }

  .btn-add {
    background: var(--primary);
    color: #fdfaf4;
    border: none;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-add:hover  { background: var(--primary-dark); }
  .btn-add:active { transform: scale(0.97); }

  /* ── Container ───────────────────────────────────── */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }

  /* ── Toolbar (stats + export/import) ─────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .stats { display: flex; gap: 16px; }

  .stat {
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    box-shadow: var(--shadow);
  }

  .stat-num   { font-size: 22px; font-weight: 700; color: var(--primary); line-height: 1.1; }
  .stat-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; margin-top: 2px; }

  .io-btns { display: flex; gap: 6px; }

  .btn-io {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-2);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn-io:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

  /* hidden file input */
  #importInput { display: none; }

  /* ── Tabs ────────────────────────────────────────── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .tab {
    padding: 10px 20px;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-3);
    cursor: pointer;
    letter-spacing: 0.04em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 700;
  }

  /* ── Tab Panel ───────────────────────────────────── */
  .tab-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    min-height: 200px;
  }

  /* ── Search ──────────────────────────────────────── */
  .search-bar {
    position: relative;
    margin-bottom: 16px;
  }

  .search-bar input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px 9px 34px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(124,92,60,0.1);
  }
  .search-bar input::placeholder { color: var(--text-3); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
    font-size: 14px;
    pointer-events: none;
  }

  /* ── Book Card ───────────────────────────────────── */
  .book-card {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px;
    margin-bottom: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--primary-light);
    border-radius: 0 var(--radius) var(--radius) 0;
    transition: box-shadow 0.2s, border-left-color 0.2s;
  }
  .book-card:hover {
    box-shadow: var(--shadow-md);
    border-left-color: var(--primary);
  }
  .book-card:last-child { margin-bottom: 0; }

  .book-spine {
    width: 6px;
    min-height: 52px;
    border-radius: 2px;
    background: var(--primary-light);
    flex-shrink: 0;
    align-self: stretch;
  }

  .book-info { flex: 1; min-width: 0; }

  .book-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .book-author {
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  .book-meta {
    font-size: 11px;
    color: var(--text-3);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    letter-spacing: 0.03em;
  }

  .book-notes {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 7px;
    line-height: 1.6;
    font-style: italic;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .stars-display {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 1px;
  }
  .stars-display .empty-star { color: var(--border); }

  .book-actions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .btn-sm {
    padding: 4px 10px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-finish  { background: var(--success); color: #fff; border-color: var(--success); }
  .btn-finish:hover  { background: #4a6a4a; }
  .btn-view    { background: var(--primary); color: #fdfaf4; border-color: var(--primary); }
  .btn-view:hover    { background: var(--primary-dark); }
  .btn-delete  { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-delete:hover  { background: var(--danger-light); }

  /* ── Divider ─────────────────────────────────────── */
  .section-divider {
    text-align: center;
    color: var(--text-3);
    font-size: 11px;
    letter-spacing: 0.12em;
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Empty State ─────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-3);
  }
  .empty-icon  { font-size: 44px; margin-bottom: 12px; opacity: 0.7; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; letter-spacing: 0.04em; }
  .empty-desc  { font-size: 12px; letter-spacing: 0.04em; }

  /* ── Modal ───────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,24,10,0.45);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  @media (min-width: 520px) {
    .modal-overlay { align-items: center; }
  }

  .modal {
    background: var(--surface);
    border-radius: 10px 10px 0 0;
    padding: 26px 24px;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    box-shadow: 0 -4px 30px rgba(60,35,10,0.12);
  }
  @media (min-width: 520px) {
    .modal { border-radius: 10px; transform: translateY(12px); box-shadow: var(--shadow-md); }
    .modal-overlay.open .modal { transform: translateY(0); }
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--primary);
  }

  .btn-close {
    background: var(--bg);
    border: 1px solid var(--border);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-close:hover { background: var(--border); }

  /* ── Form ────────────────────────────────────────── */
  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .label-opt { color: var(--text-3); font-weight: 400; }
  .required   { color: var(--danger); }

  input[type=text],
  input[type=date],
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type=text]:focus,
  input[type=date]:focus,
  textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(124,92,60,0.1);
    background: var(--surface);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.65; }

  .error-msg { color: var(--danger); font-size: 11px; margin-top: 4px; display: none; letter-spacing: 0.04em; }

  /* ── Star Rating ─────────────────────────────────── */
  .stars-input { display: flex; gap: 4px; }

  .star-btn {
    font-size: 26px;
    cursor: pointer;
    color: var(--border);
    background: none;
    border: none;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.12s, transform 0.1s;
  }
  .star-btn:hover   { transform: scale(1.15); }
  .star-btn.filled  { color: var(--gold); }

  /* ── Form Actions ────────────────────────────────── */
  .form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .btn-lg {
    padding: 9px 20px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .btn-lg:active { transform: scale(0.97); }

  .btn-cancel  { background: var(--bg); color: var(--text-2); border-color: var(--border); }
  .btn-cancel:hover  { background: var(--border); }
  .btn-confirm { background: var(--primary); color: #fdfaf4; border-color: var(--primary); }
  .btn-confirm:hover { background: var(--primary-dark); }
  .btn-done    { background: var(--success); color: #fff; border-color: var(--success); }
  .btn-done:hover    { background: #4a6a4a; }

  /* ── View book info box ──────────────────────────── */
  .view-book-info {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--primary);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .view-book-title  { font-size: 15px; font-weight: 700; color: var(--text); }
  .view-book-author { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  /* ── Toast ───────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fdfaf4;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    letter-spacing: 0.04em;
    z-index: 999;
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-title">閱讀紀錄</div>
      <div class="header-sub">記錄每一本讀過的好書</div>
    </div>
    <button class="btn-add" onclick="openAddModal()">＋ 新增書籍</button>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────── -->
<div class="container">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="statWant">0</div>
        <div class="stat-label">想讀</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statFinished">0</div>
        <div class="stat-label">已讀</div>
      </div>
    </div>
    <div class="io-btns">
      <button class="btn-io" onclick="exportData()" title="將書單備份為 JSON 檔案">
        ↑ 匯出備份
      </button>
      <button class="btn-io" onclick="document.getElementById('importInput').click()" title="從備份 JSON 檔案還原書單">
        ↓ 匯入備份
      </button>
      <input type="file" id="importInput" accept=".json" onchange="importData(event)">
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabWant" onclick="switchTab('want')">
      想讀的書 <span id="wantBadge"></span>
    </button>
    <button class="tab" id="tabFinished" onclick="switchTab('finished')">
      已讀完 <span id="finishedBadge"></span>
    </button>
  </div>

  <!-- Panel -->
  <div class="tab-panel">
    <div class="search-bar">
      <span class="search-icon">✦</span>
      <input type="text" id="searchInput" placeholder="搜尋書名或作者…" oninput="renderBooks()">
    </div>
    <div id="wantList"></div>
    <div id="finishedList" style="display:none;"></div>
  </div>

</div><!-- /container -->

<!-- ── Toast ──────────────────────────────────────── -->
<div class="toast" id="toast"></div>


<!-- ══ Modal: 新增書籍 ══════════════════════════════ -->
<div class="modal-overlay" id="addOverlay" onclick="onOverlayClick(event,'addOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">新增書籍</div>
      <button class="btn-close" onclick="closeModal('addOverlay')">✕</button>
    </div>
    <div class="form-group">
      <label>書名 <span class="required">*</span></label>
      <input type="text" id="addTitle" placeholder="輸入書名" oninput="hideErr('addTitleErr')">
      <div class="error-msg" id="addTitleErr">請輸入書名</div>
    </div>
    <div class="form-group">
      <label>作者 <span class="label-opt">（選填）</span></label>
      <input type="text" id="addAuthor" placeholder="輸入作者">
    </div>
    <div class="form-actions">
      <button class="btn-lg btn-cancel"  onclick="closeModal('addOverlay')">取消</button>
      <button class="btn-lg btn-confirm" onclick="submitAdd()">新增</button>
    </div>
  </div>
</div>


<!-- ══ Modal: 標記讀完 ══════════════════════════════ -->
<div class="modal-overlay" id="finishOverlay" onclick="onOverlayClick(event,'finishOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">標記為已讀完</div>
      <button class="btn-close" onclick="closeModal('finishOverlay')">✕</button>
    </div>
    <input type="hidden" id="finishId">
    <div class="form-group">
      <label>讀完日期</label>
      <input type="date" id="finishDate">
    </div>
    <div class="form-group">
      <label>評分 <span class="label-opt">（選填）</span></label>
      <div class="stars-input" id="finishStars">
        <button class="star-btn" data-v="1" onclick="setRating('finish',1)">★</button>
        <button class="star-btn" data-v="2" onclick="setRating('finish',2)">★</button>
        <button class="star-btn" data-v="3" onclick="setRating('finish',3)">★</button>
        <button class="star-btn" data-v="4" onclick="setRating('finish',4)">★</button>
        <button class="star-btn" data-v="5" onclick="setRating('finish',5)">★</button>
      </div>
    </div>
    <div class="form-group">
      <label>心得筆記 <span class="label-opt">（選填）</span></label>
      <textarea id="finishNotes" placeholder="寫下這本書帶給你的感受…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-lg btn-cancel" onclick="closeModal('finishOverlay')">取消</button>
      <button class="btn-lg btn-done"   onclick="submitFinish()">確認完成</button>
    </div>
  </div>
</div>


<!-- ══ Modal: 查看 / 編輯 ════════════════════════════ -->
<div class="modal-overlay" id="viewOverlay" onclick="onOverlayClick(event,'viewOverlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">讀書紀錄</div>
      <button class="btn-close" onclick="closeModal('viewOverlay')">✕</button>
    </div>
    <input type="hidden" id="viewId">
    <div class="view-book-info" id="viewBookInfo"></div>
    <div class="form-group">
      <label>讀完日期</label>
      <input type="date" id="viewDate">
    </div>
    <div class="form-group">
      <label>評分</label>
      <div class="stars-input" id="viewStars">
        <button class="star-btn" data-v="1" onclick="setRating('view',1)">★</button>
        <button class="star-btn" data-v="2" onclick="setRating('view',2)">★</button>
        <button class="star-btn" data-v="3" onclick="setRating('view',3)">★</button>
        <button class="star-btn" data-v="4" onclick="setRating('view',4)">★</button>
        <button class="star-btn" data-v="5" onclick="setRating('view',5)">★</button>
      </div>
    </div>
    <div class="form-group">
      <label>心得筆記</label>
      <textarea id="viewNotes" placeholder="寫下這本書帶給你的感受…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-lg btn-cancel"  onclick="closeModal('viewOverlay')">關閉</button>
      <button class="btn-lg btn-confirm" onclick="submitUpdate()">儲存</button>
    </div>
  </div>
</div>


<script>
// ── State ────────────────────────────────────────────
let data    = { wantToRead: [], finished: [] };
let curTab  = 'want';
let ratings = { finish: 0, view: 0 };

// ── Persistence ───────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem('readingLog_v1');
    if (s) data = JSON.parse(s);
  } catch(e) {}
  if (!Array.isArray(data.wantToRead)) data.wantToRead = [];
  if (!Array.isArray(data.finished))   data.finished   = [];
}

function save() {
  localStorage.setItem('readingLog_v1', JSON.stringify(data));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ── Export ────────────────────────────────────────────
function exportData() {
  const json     = JSON.stringify(data, null, 2);
  const blob     = new Blob([json], { type: 'application/json' });
  const url      = URL.createObjectURL(blob);
  const a        = document.createElement('a');
  a.href         = url;
  a.download     = `閱讀紀錄備份_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已匯出備份檔案');
}

// ── Import ────────────────────────────────────────────
function importData(e) {
  const file = e.target.files[0];
  e.target.value = '';        // reset so same file can be re-selected
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported.wantToRead) || !Array.isArray(imported.finished)) {
        throw new Error('格式不符');
      }
      const msg = `匯入後將覆蓋現有資料：\n・想讀 ${imported.wantToRead.length} 本\n・已讀 ${imported.finished.length} 本\n\n確定繼續？`;
      if (!confirm(msg)) return;
      data = imported;
      save();
      renderBooks();
      toast('匯入成功');
    } catch(err) {
      alert('匯入失敗，請確認選取的是正確的備份檔案。');
    }
  };
  reader.readAsText(file);
}

// ── Tab ───────────────────────────────────────────────
function switchTab(tab) {
  curTab = tab;
  document.getElementById('tabWant').className    = 'tab' + (tab === 'want'     ? ' active' : '');
  document.getElementById('tabFinished').className = 'tab' + (tab === 'finished' ? ' active' : '');
  document.getElementById('wantList').style.display     = tab === 'want'     ? '' : 'none';
  document.getElementById('finishedList').style.display = tab === 'finished' ? '' : 'none';
  document.getElementById('searchInput').value = '';
  renderBooks();
}

// ── Render ────────────────────────────────────────────
function sq() { return document.getElementById('searchInput').value.trim().toLowerCase(); }

function renderBooks() {
  updateStats();
  const q = sq();

  // ── Want to Read ──────────────────────────────────
  let want = data.wantToRead;
  if (q) want = want.filter(b => b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q));

  const wEl = document.getElementById('wantList');
  if (want.length === 0) {
    wEl.innerHTML = emptyState(
      q ? '找不到符合的書籍' : '書單是空的',
      q ? '試試其他關鍵字'   : '點擊右上角「新增書籍」開始建立書單'
    );
  } else {
    wEl.innerHTML = want.map(b => `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title" title="${x(b.title)}">${x(b.title)}</div>
          ${b.author ? `<div class="book-author">${x(b.author)}</div>` : ''}
          <div class="book-meta">加入於 ${fmtDate(b.addedDate)}</div>
        </div>
        <div class="book-actions">
          <button class="btn-sm btn-finish" onclick="openFinishModal('${b.id}')">讀完了</button>
          <button class="btn-sm btn-delete" onclick="deleteBook('${b.id}','want')">刪除</button>
        </div>
      </div>`).join('');
  }

  // ── Finished ──────────────────────────────────────
  let fin = data.finished;
  if (q) fin = fin.filter(b => b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q));

  const fEl = document.getElementById('finishedList');
  if (fin.length === 0) {
    fEl.innerHTML = emptyState(
      q ? '找不到符合的書籍'   : '還沒有讀完的書',
      q ? '試試其他關鍵字' : '從書單點「讀完了」即可移到這裡'
    );
  } else {
    fEl.innerHTML = fin.map(b => {
      const starsHtml = b.rating
        ? '★'.repeat(b.rating) + '<span class="empty-star">' + '★'.repeat(5 - b.rating) + '</span>'
        : '';
      return `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title" title="${x(b.title)}">${x(b.title)}</div>
          ${b.author ? `<div class="book-author">${x(b.author)}</div>` : ''}
          <div class="book-meta">
            ${b.finishedDate ? `<span>讀完於 ${fmtDate(b.finishedDate)}</span>` : ''}
            ${starsHtml ? `<span class="stars-display">${starsHtml}</span>` : ''}
          </div>
          ${b.notes ? `<div class="book-notes">${x(b.notes)}</div>` : ''}
        </div>
        <div class="book-actions">
          <button class="btn-sm btn-view"   onclick="openViewModal('${b.id}')">查看編輯</button>
          <button class="btn-sm btn-delete" onclick="deleteBook('${b.id}','finished')">刪除</button>
        </div>
      </div>`;
    }).join('');
  }
}

function updateStats() {
  document.getElementById('statWant').textContent     = data.wantToRead.length;
  document.getElementById('statFinished').textContent = data.finished.length;
  document.getElementById('wantBadge').textContent     = data.wantToRead.length ? `(${data.wantToRead.length})` : '';
  document.getElementById('finishedBadge').textContent = data.finished.length   ? `(${data.finished.length})`   : '';
}

function emptyState(title, desc) {
  return `<div class="empty">
    <div class="empty-icon">◎</div>
    <div class="empty-title">${title}</div>
    <div class="empty-desc">${desc}</div>
  </div>`;
}

// ── Add Book ──────────────────────────────────────────
function openAddModal() {
  document.getElementById('addTitle').value  = '';
  document.getElementById('addAuthor').value = '';
  hideErr('addTitleErr');
  openModal('addOverlay');
  setTimeout(() => document.getElementById('addTitle').focus(), 280);
}

function submitAdd() {
  const title = document.getElementById('addTitle').value.trim();
  if (!title) {
    document.getElementById('addTitleErr').style.display = 'block';
    document.getElementById('addTitle').focus();
    return;
  }
  data.wantToRead.unshift({
    id:        uid(),
    title,
    author:    document.getElementById('addAuthor').value.trim(),
    addedDate: today()
  });
  save();
  renderBooks();
  closeModal('addOverlay');
  if (curTab !== 'want') switchTab('want');
  toast(`《${title}》已加入書單`);
}

// ── Delete ────────────────────────────────────────────
function deleteBook(id, list) {
  if (!confirm('確定要刪除這本書嗎？')) return;
  if (list === 'want') data.wantToRead = data.wantToRead.filter(b => b.id !== id);
  else                 data.finished   = data.finished.filter(b => b.id !== id);
  save();
  renderBooks();
}

// ── Mark Finished ─────────────────────────────────────
function openFinishModal(id) {
  ratings.finish = 0;
  document.getElementById('finishId').value    = id;
  document.getElementById('finishDate').value  = today();
  document.getElementById('finishNotes').value = '';
  renderStars('finish', 0);
  openModal('finishOverlay');
}

function submitFinish() {
  const id   = document.getElementById('finishId').value;
  const book = data.wantToRead.find(b => b.id === id);
  if (!book) return;

  data.wantToRead = data.wantToRead.filter(b => b.id !== id);
  data.finished.unshift({
    ...book,
    finishedDate: document.getElementById('finishDate').value,
    rating:       ratings.finish,
    notes:        document.getElementById('finishNotes').value.trim()
  });
  save();
  renderBooks();
  closeModal('finishOverlay');
  switchTab('finished');
  toast(`《${book.title}》已標記讀完`);
}

// ── View / Edit ───────────────────────────────────────
function openViewModal(id) {
  const b = data.finished.find(b => b.id === id);
  if (!b) return;

  ratings.view = b.rating || 0;
  document.getElementById('viewId').value = id;
  document.getElementById('viewBookInfo').innerHTML =
    `<div class="view-book-title">${x(b.title)}</div>` +
    (b.author ? `<div class="view-book-author">${x(b.author)}</div>` : '');
  document.getElementById('viewDate').value  = b.finishedDate || '';
  document.getElementById('viewNotes').value = b.notes || '';
  renderStars('view', ratings.view);
  openModal('viewOverlay');
}

function submitUpdate() {
  const id  = document.getElementById('viewId').value;
  const idx = data.finished.findIndex(b => b.id === id);
  if (idx === -1) return;

  data.finished[idx] = {
    ...data.finished[idx],
    finishedDate: document.getElementById('viewDate').value,
    rating:       ratings.view,
    notes:        document.getElementById('viewNotes').value.trim()
  };
  save();
  renderBooks();
  closeModal('viewOverlay');
  toast('紀錄已儲存');
}

// ── Rating ────────────────────────────────────────────
function setRating(mode, val) {
  ratings[mode] = val;
  renderStars(mode, val);
}

function renderStars(mode, val) {
  const id = mode === 'finish' ? 'finishStars' : 'viewStars';
  document.getElementById(id).querySelectorAll('.star-btn').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.v) <= val);
  });
}

// ── Modal ─────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function onOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function hideErr(id) {
  document.getElementById(id).style.display = 'none';
}

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Keyboard ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['addOverlay','finishOverlay','viewOverlay'].forEach(id => {
      if (document.getElementById(id).classList.contains('open')) closeModal(id);
    });
  }
  if (e.key === 'Enter' && !e.shiftKey
      && document.getElementById('addOverlay').classList.contains('open')
      && document.activeElement.tagName !== 'TEXTAREA') {
    submitAdd();
  }
});

// ── Helpers ───────────────────────────────────────────
function x(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function today() { return new Date().toISOString().slice(0, 10); }

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${y} 年 ${parseInt(m)} 月 ${parseInt(day)} 日`;
}

// ── Init ──────────────────────────────────────────────
load();
renderBooks();
</script>
</body>
</html>
